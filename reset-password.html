<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link
      rel="shortcut icon"
      href="src/assets/favicon.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="src/css/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <style>
    #resetPasswordForm {
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 1.25rem #fdd133;
      border-radius: 1.5rem;
      padding: 2rem;
      flex-direction: column;
      max-width: 30rem;
    }

    .field-error,
    .form-error,
    .form-success {
      width: 100%;
      font-size: 0.9rem;
      align-items: center;
      display: none;
    }

    .field-error,
    .form-error,
    .operation-error {
      color: rgb(235, 74, 74);
    }

    .field-error {
      justify-content: flex-start;
      margin-top: 0.5rem;
    }

    .form-error,
    .form-success,
    .operation-error {
      justify-content: center;
      text-align: center;
    }

    .form-success {
      color: rgb(43, 225, 100);
    }

    form {
      padding: 0.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 0.9rem;
      width: 20rem;
    }

    .formTitle {
      font-size: 1.8rem;
      font-family: "Poppins", sans-serif;
      color: #bbbaba;
      font-weight: 500;
    }

    @media (max-width: 600px) {
      .field-error {
        color: red;
        font-size: 0.7rem;
        margin-top: 0.3rem;
      }

      .formTitle {
        font-size: 1.2rem;
        font-weight: 500;
        margin: 0 0.5rem;
      }

      form {
        padding: 0.5rem;
        width: 15rem;
      }
    }

    .form-button i {
      width: 20px;
    }

    #changePasswordForm,
    #resetPasswordForm {
      display: none;
    }
  </style>

  <body>
    <!-- Reset password Page  -->
    <div class="outerContainer" style="display: flex; visibility: visible">
      <!-- lamp container  -->
      <div class="lampOuterContainer">
        <div class="lampInnerContainer">
          <div class="glowState">
            <img
              src="src/assets/glow.svg"
              alt="glowLamp"
              style="display: flex"
            />
          </div>
        </div>
        <div class="buttonWrapper">
          <div class="btnBase">
            <div class="btnSurface" id="btnSurface">
              <div class="btnBulbContainer" id="btnState">
                <div class="btnBulb">
                  <img src="src/assets/glowBulb.svg" alt="glowBulb" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div
        class="formOuterContainer"
        style="display: flex; visibility: visible"
      >
        <!-- Reset password form  -->
        <form id="resetPasswordForm" style="display: flex">
          <div class="formTitle">Reset Password</div>
          <div class="form-error" id="resetPasswordFormError"></div>
          <div class="form-success" id="resetPasswordFormSuccess"></div>
          <div class="inputField">
            <input type="password" id="resetNewPassword" required />
            <label id="resetNewPasswordLabel">New Password</label>
            <i
              class="fa-solid fa-eye toggle-eye"
              role="button"
              data-target="resetNewPassword"
            ></i>
            <div class="field-error" id="resetNewPasswordError"></div>
          </div>
          <div class="inputField">
            <input type="password" id="resetConfirmPassword" required />
            <label id="resetConfirmPasswordLabel">Confirm Password</label>
            <i
              class="fa-solid fa-eye toggle-eye"
              role="button"
              data-target="resetConfirmPassword"
            ></i>
            <div class="field-error" id="resetConfirmPasswordError"></div>
          </div>
          <button class="form-button" type="submit">Reset Password</button>
        </form>
      </div>
    </div>
  </body>
  <script src="src/scripts/main.js" type="module"></script>
</html>
